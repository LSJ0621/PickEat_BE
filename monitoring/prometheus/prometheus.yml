global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pick-eat-monitor'

# Alertmanager 설정 (선택사항)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# 스크래핑 대상 설정
scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NestJS 애플리케이션 메트릭 (추후 추가 예정)
  # NestJS 앱에서 /metrics 엔드포인트를 노출하면 여기에 추가
  # - job_name: 'nestjs-app'
  #   static_configs:
  #     - targets: ['host.docker.internal:3000']
  #   metrics_path: '/metrics'
